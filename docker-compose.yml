version: '3.8'
services:
  zephyr:
    build: .
    platform: linux/amd64
    volumes:
      - zephyr-workspace:/workspace
      - ./:/workspace/app
      - ./scripts:/workspace/scripts
      - zephyr-ccache:/ccache
    working_dir: /workspace
    environment:
      - ZEPHYR_BASE=/workspace/zephyr
      - CCACHE_DIR=/ccache
      - CCACHE_MAXSIZE=5G
      - HOST_WORKSPACE=${PWD}
    stdin_open: true
    tty: true

volumes:
  zephyr-workspace:
  zephyr-ccache:
