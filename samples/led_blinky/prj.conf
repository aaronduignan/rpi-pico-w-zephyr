CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y

# WiFi driver must be enabled to initialise the CYW43439 and its GPIO controller.
# We don't connect to a network — the chip just needs to be up for GPIO to work.
#
# CONFIG_AIROC_WIFI_CUSTOM=y tells WHD to embed firmware blobs from paths set
# in CMakeLists.txt (FW_IMAGE_NAME, CLM_IMAGE_NAME, NVRAM_IMAGE_NAME). WHD runs
# this blob embedding unconditionally, so those paths must be set even when only
# the GPIO controller is used and WiFi/BT are never started.
CONFIG_WIFI=y
CONFIG_WIFI_AIROC=y
CONFIG_AIROC_WIFI_CUSTOM=y
CONFIG_CYW43439=y

CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y

CONFIG_GPIO=y
# CONFIG_GPIO_LOG_LEVEL_DBG=y

# The networking stack needs a random number generator for IPv6. Without BT
# (which pulls in mbedTLS and a crypto RNG), nothing satisfies sys_rand_get.
CONFIG_TEST_RANDOM_GENERATOR=y
