CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_PRINTK=n
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_SHELL_LOG_BACKEND=n
CONFIG_BT_HCI_DRIVER_LOG_LEVEL_INF=y

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="pico:~$ "
CONFIG_SHELL_STACK_SIZE=8192
CONFIG_SHELL_HISTORY=y

CONFIG_WIFI=y
CONFIG_WIFI_AIROC=y
CONFIG_AIROC_WIFI_CUSTOM=y

CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y

CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_BUF_ACL_TX_COUNT=8
CONFIG_BT_HCI_TX_STACK_SIZE_WITH_PROMPT=y
CONFIG_BT_HCI_TX_STACK_SIZE=2048
CONFIG_BT_TX_PROCESSOR_STACK_SIZE=2048
CONFIG_BT_RX_STACK_SIZE=2048
# CONFIG_BT_CENTRAL=y enables active scanning (SCAN_REQ PDUs) which would
# allow discovery of device names via SCAN_RSP. However, active scanning
# causes HCI LE Set Scan Enable timeouts on the shared CYW43439 SPI bus —
# the BT core and WiFi core share the bus without arbitration, and the
# controller goes unresponsive under the extra load. Passive only for now.
CONFIG_BT_DEVICE_NAME="Pico W Logger"
CONFIG_BT_GATT_CACHING=n
